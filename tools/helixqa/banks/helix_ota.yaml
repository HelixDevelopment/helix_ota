# =============================================================================
# helix_ota.yaml — HelixQA challenge bank (Helix OTA control plane)
# -----------------------------------------------------------------------------
# Constitution §11.4.58 (parallel-development PWU — every user-visible PWU adds
# a Challenge entry dispatching to its real test, scoring PASS only on positive
# captured evidence) + §11.4.27 (no fakes beyond unit tests — every challenge
# exercises the real, fully implemented System).
#
# THIS BANK IS NOT METADATA-ONLY. Every entry below is dispatched by RUNNING the
# real, autonomous, anti-bluff E2E challenge `tests/e2e/challenge_operational.sh`
# against a LIVE `ota-server` process over real HTTP (curl + jq, no mocks of the
# system under test). A PASS requires the real run to PASS — there is no
# metadata / config-only / absence-of-error path to a PASS here.
#
# How to dispatch (the dispatch command for every challenge below):
#   1. Start the server (in-memory repo, plain HTTP :8080):
#        cd server
#        HELIX_ADMIN_USERNAME=admin@helix.test \
#        HELIX_ADMIN_PASSWORD=s3cret \
#        HELIX_TOKEN_SECRET=test \
#        go run ./cmd/ota-server &
#        until curl -fsS http://127.0.0.1:8080/healthz >/dev/null 2>&1; do sleep 0.5; done
#   2. Run the challenge (HELIX_ADMIN_PASSWORD is REQUIRED — admin login is
#      disabled without it; missing password/curl/jq => exit 3 SKIP, never a
#      false PASS):
#        HELIX_BASE_URL=http://127.0.0.1:8080 \
#        HELIX_ADMIN_USERNAME=admin@helix.test \
#        HELIX_ADMIN_PASSWORD=s3cret \
#        bash tests/e2e/challenge_operational.sh
#
# The challenge is a single self-cleaning script that asserts all capability
# areas in ONE run; each entry below names the SAME dispatch command and the
# SPECIFIC assertions that capability area is scored on within that run. The
# script exits 0 only if every hard assertion passed.
#
# Captured evidence (real run): tests/e2e/RUN_EVIDENCE.txt
#   — 28 passed, 0 failed, 1 skipped; RESULT: PASS; with negative controls
#     proving the challenge FAILs on wrong password / server absent.
# =============================================================================
---
bank:
  id: helix_ota_operational_rollout
  name: Helix OTA — operational + rollout E2E challenge bank
  revision: 3
  last_modified: "2026-06-10T10:10:00Z"
  description: >-
    Black-box, anti-bluff end-to-end challenges that drive the live ota-server
    REST API over real HTTP and assert real HTTP status codes plus key JSON
    fields. No mocks of the system under test.
  authority: "Constitution §11.4.58 / §11.4.27 / §11.4 anti-bluff covenant"
  system_under_test: ota-server (Gin modular monolith, in-memory repo by default)

  # Common dispatch contract shared by every challenge in this bank.
  dispatch:
    command: bash tests/e2e/challenge_operational.sh
    working_directory: /Volumes/T7/Projects/helix_ota
    requires:
      - bash
      - curl
      - jq
      - a running ota-server reachable at HELIX_BASE_URL
    env:
      HELIX_BASE_URL: "http://127.0.0.1:8080"
      HELIX_ADMIN_USERNAME: "admin@helix.test"
      HELIX_ADMIN_PASSWORD: "<server admin password — REQUIRED>"
    skip_codes:
      "3": "curl/jq/HELIX_ADMIN_PASSWORD missing — SKIP-with-reason, never a false PASS (§11.4.3)"
    pass_contract: >-
      The script exits 0 only if EVERY hard assertion passed. A PASS for any
      challenge below requires this real run to complete with RESULT: PASS.
    evidence_artifact: tests/e2e/RUN_EVIDENCE.txt

  challenges:
    - id: HOTA-AUTH-LOGIN
      title: Admin login issues a signed Bearer claims token; auth is enforced
      capability_area: auth/login
      dispatch_command: >-
        HELIX_BASE_URL=http://127.0.0.1:8080
        HELIX_ADMIN_USERNAME=admin@helix.test
        HELIX_ADMIN_PASSWORD=<pw>
        bash tests/e2e/challenge_operational.sh
      pass_criterion: >-
        POST /api/v1/auth/login -> HTTP 200 with a non-empty access_token;
        token_type is "Bearer"; the access_token matches the documented
        2-segment <base64url-claims>.<HMAC-sig> shape and segment 1 decodes to
        JSON carrying "sub" and a "roles" array containing "admin". Anti-bluff:
        an unauthenticated GET /api/v1/telemetry/overview MUST return 401
        (auth is enforced).
      asserted_lines:
        - "POST /auth/login (HTTP 200)"
        - "login token_type is Bearer"
        - "access_token is a signed claims blob carrying sub + admin role"
        - "anti-bluff: unauthenticated GET /telemetry/overview -> 401 (auth enforced)"
      evidence_artifact: tests/e2e/RUN_EVIDENCE.txt

    - id: HOTA-DEVICE-REGISTER
      title: Device registration returns a device_id + device_token and status echoes it
      capability_area: device-register
      dispatch_command: >-
        HELIX_BASE_URL=http://127.0.0.1:8080
        HELIX_ADMIN_USERNAME=admin@helix.test
        HELIX_ADMIN_PASSWORD=<pw>
        bash tests/e2e/challenge_operational.sh
      pass_criterion: >-
        POST /api/v1/devices/register -> HTTP 201 with a non-null device_id and
        a non-empty device_token; GET /api/v1/devices/{id}/status -> HTTP 200
        and the returned device_id echoes the registered id.
      asserted_lines:
        - "POST /devices/register (HTTP 201)"
        - "device registration returned a device_token"
        - "GET /devices/{id}/status (HTTP 200)"
        - "device status echoes device_id"
      evidence_artifact: tests/e2e/RUN_EVIDENCE.txt

    - id: HOTA-GROUP-LIFECYCLE
      title: Device-group create/get/batch-add-member/list/delete lifecycle is real (widened member-add wire)
      capability_area: group-lifecycle
      dispatch_command: >-
        HELIX_BASE_URL=http://127.0.0.1:8080
        HELIX_ADMIN_USERNAME=admin@helix.test
        HELIX_ADMIN_PASSWORD=<pw>
        bash tests/e2e/challenge_operational.sh
      pass_criterion: >-
        POST /api/v1/groups -> 201 returning the group id under the new
        "group_id" key (the deprecated "id" key MUST be absent — breaking wire
        change) plus an echoed name; GET /api/v1/groups/{id} -> 200 echoing
        name; the member-add endpoint is now a BATCH:
        POST /api/v1/groups/{id}/members {"device_ids":[...]} -> 200 returning
        {added,already_member,not_found}, where adding the REGISTERED device puts
        its id in .added (a 204 now FAILs); re-adding the same device -> 200 with
        the id in .already_member; an UNREGISTERED device id -> 200 with the id
        in .not_found (a device must be registered to be added); an empty
        {"device_ids":[]} batch -> 400; adding to an unknown group -> 404;
        GET /api/v1/groups/{id}/members -> 200 and items[].device_id contains the
        added device (each item carries device_id + added_at);
        DELETE /api/v1/groups/{id}/members/{deviceId} -> 204;
        DELETE /api/v1/groups/{id} -> 204; and a follow-up GET on the deleted
        group -> 404 (deletion is real, not a no-op).
      asserted_lines:
        - "POST /groups (HTTP 201)"
        - "group create uses new 'group_id' key (old 'id' key absent)"
        - "group create echoes name"
        - "GET /groups/{id} (HTTP 200)"
        - "GET group echoes name"
        - "POST /groups/{id}/members (batch add registered device) (HTTP 200)"
        - "batch add put the registered device in .added"
        - "POST /groups/{id}/members (re-add) -> 200 (HTTP 200)"
        - "re-add reports the device in .already_member"
        - "POST /groups/{id}/members (unregistered id) -> 200 (HTTP 200)"
        - "unregistered device id is reported in .not_found"
        - "POST /groups/{id}/members (empty device_ids) -> 400 (HTTP 400)"
        - "POST /groups/{absent}/members -> 404 (HTTP 404)"
        - "GET /groups/{id}/members (HTTP 200)"
        - "member list contains the added device_id"
        - "DELETE /groups/{id}/members/{deviceId} -> 204 (HTTP 204)"
        - "DELETE /groups/{id} -> 204 (HTTP 204)"
        - "GET /groups/{deleted} -> 404 (deletion is real) (HTTP 404)"
      evidence_artifact: tests/e2e/RUN_EVIDENCE.txt

    - id: HOTA-AUDIT-TRAIL
      title: Mutating actions are audited; reads are not (anti-bluff non-empty audit)
      capability_area: audit-trail
      dispatch_command: >-
        HELIX_BASE_URL=http://127.0.0.1:8080
        HELIX_ADMIN_USERNAME=admin@helix.test
        HELIX_ADMIN_PASSWORD=<pw>
        bash tests/e2e/challenge_operational.sh
      pass_criterion: >-
        GET /api/v1/audit?limit=200 -> HTTP 200 with a NON-EMPTY items list
        (an empty audit log after the auditable group mutations FAILs the
        challenge); the actions list contains "GROUP_CREATE" and
        "GROUP_MEMBER_CREATE"; and anti-bluff, no GET-read action (e.g.
        "AUDIT_ACTION") appears — only mutating actions are recorded.
      asserted_lines:
        - "GET /audit (HTTP 200)"
        - "audit log is non-empty (13 entries)"
        - "audit log contains GROUP_CREATE (the group we created was audited)"
        - "audit log contains GROUP_MEMBER_CREATE (member-add was audited)"
        - "anti-bluff: GET reads are not audited (only mutations)"
      evidence_artifact: tests/e2e/RUN_EVIDENCE.txt

    - id: HOTA-TELEMETRY-OVERVIEW
      title: Telemetry overview returns total + event_counts under auth
      capability_area: telemetry-overview
      dispatch_command: >-
        HELIX_BASE_URL=http://127.0.0.1:8080
        HELIX_ADMIN_USERNAME=admin@helix.test
        HELIX_ADMIN_PASSWORD=<pw>
        bash tests/e2e/challenge_operational.sh
      pass_criterion: >-
        Authenticated GET /api/v1/telemetry/overview -> HTTP 200 and the body
        has both "total" and "event_counts" fields. (The unauthenticated 401
        on this same route is the auth-enforcement anti-bluff scored under
        HOTA-AUTH-LOGIN.)
      asserted_lines:
        - "GET /telemetry/overview (HTTP 200)"
        - "telemetry overview has total + event_counts"
      evidence_artifact: tests/e2e/RUN_EVIDENCE.txt

    - id: HOTA-ROLLOUT-ROUTE-GATES
      title: Rollout routes gate on deployment existence (404 for absent deployment)
      capability_area: rollout-route-gates
      dispatch_command: >-
        HELIX_BASE_URL=http://127.0.0.1:8080
        HELIX_ADMIN_USERNAME=admin@helix.test
        HELIX_ADMIN_PASSWORD=<pw>
        bash tests/e2e/challenge_operational.sh
      pass_criterion: >-
        Deterministic black-box rollout-route semantics:
        GET /api/v1/deployments/{absent}/rollout -> HTTP 404 and
        POST /api/v1/deployments/{absent}/rollout (valid phases body) -> HTTP 404
        (the deployment-existence gate is enforced before any rollout op).
        NOTE: the OPTIONAL full pipeline (signed artifact -> release ->
        deployment -> rollout create/get/evaluate) SKIPs-with-reason by default
        because it requires a server-config-coupled signed artifact; it is
        NOT scored as PASS here unless driven via
        HELIX_E2E_TRY_PIPELINE=1 + HELIX_E2E_VERIFIED_RELEASE_ID=<id>.
      asserted_lines:
        - "GET /deployments/{absent}/rollout -> 404 (HTTP 404)"
        - "POST /deployments/{absent}/rollout -> 404 (deployment-existence gate) (HTTP 404)"
      skip_lines:
        - "full pipeline (upload->release->deploy->rollout create/get/evaluate): requires a server-config-coupled signed artifact ... (SKIP)"
      evidence_artifact: tests/e2e/RUN_EVIDENCE.txt

    - id: HOTA-PIPELINE-SIGNED
      title: Signed artifact full pipeline reaches a delta-bearing update check
      capability_area: artifact-pipeline-signed
      dispatch_command: >-
        bash tests/e2e/pipeline_signed.sh
      pass_criterion: >-
        With a real ephemeral ed25519 key configured on the server, the full happy
        path PASSes end to end: upload signed BASE+TARGET -> 201 (verified=true);
        releases -> 201; deployment -> 201; rollout create -> 201, get -> 200,
        evaluate -> 200 (action advance); POST /deltas -> 201; GET /client/update
        (device on base) -> 200 carrying both the full payload AND a populated
        .delta (base_version + matching delta sha256). Anti-bluff control: a bogus
        signature -> 422 SIGNATURE_INVALID (the server genuinely verifies). Keys are
        ephemeral (mktemp, rm'd on exit; §11.4.10). 32 passed / 0 failed / 0 skipped.
      asserted_lines:
        - "upload signed base v1.0.0 -> 201 (verified true)"
        - "GET /client/update -> 200 with populated .delta (base_version 1.0.0)"
        - "bogus signature -> 422 SIGNATURE_INVALID"
      evidence_artifact: tests/e2e/PIPELINE_EVIDENCE.txt

    - id: HOTA-SECURITY-PROBES
      title: Adversarial security probes (authn/authz/ownership/injection/trust-boundary)
      capability_area: security
      dispatch_command: >-
        bash tests/security/security_probes.sh
      pass_criterion: >-
        Black-box adversarial suite against the live server: unauthenticated calls
        -> 401; device-role token on operator/admin routes -> 403; cross-device
        telemetry read/write -> 403 (own -> 200); forged/mutated/empty JWT -> 401;
        SQL/XSS/NoSQL/path-traversal inputs are inert (no 5xx; stored verbatim or
        400/404); malformed + 1 MiB JSON -> 400 not 5xx; trust boundary — an
        attacker-supplied public_key form field -> 422 (the verify key is config-only).
        37 passed / 0 failed / 0 skipped.
      asserted_lines:
        - "unauthenticated -> 401 across telemetry/audit/groups/devices"
        - "device-role on operator/admin routes -> 403"
        - "attacker-supplied public_key -> 422 (config-only trust boundary)"
      evidence_artifact: tests/security/RUN_EVIDENCE.txt

    - id: HOTA-FILTERS-PAGINATION
      title: Telemetry filters (event/since/until) + group & member cursor pagination
      capability_area: query-filters-pagination
      # This challenge is FULLY SELF-HOSTING: it builds + boots its OWN ota-server
      # (in-memory, ephemeral, port 8096), seeds real state via the real API, drives
      # the two features over real HTTP, and tears the server down on every exit
      # path (trap cleanup). It does NOT use the shared HELIX_BASE_URL server above,
      # needs NO admin password (it mints an ephemeral one), and runs with zero
      # manual steps (§11.4.98 full-automation). Re-runnable end-to-end any number
      # of times (verified 2x, identical 50/0/0; §11.4.50).
      dispatch_command: >-
        bash tests/e2e/challenge_filters_pagination.sh
      requires:
        - bash
        - go
        - curl
        - jq
      pass_criterion: >-
        Against a self-hosted live ota-server, with six telemetry events seeded at
        distinct types + ascending RFC3339 timestamps (ingest .accepted==6 asserted,
        so a green filter over un-ingested data is impossible):
        FEATURE 1 (telemetry filters) —
        GET /api/v1/devices/{id}/telemetry?event=installing returns ONLY the 2
        installing events (no other type leaked); ?event=success returns exactly
        the one success event; a BOGUS ?event= -> HTTP 400 VALIDATION_FAILED on
        field "event" (no silent-empty, §11.4.6); ?since/?until is an INCLUSIVE
        window (both boundary timestamps present, none outside); combined
        event+window narrows to the single matching event; an inverted since>until
        window -> 0 items + null next_cursor; ?limit=2 walks all 6 events across
        pages via cursor with NO overlap/gap.
        FEATURE 2 (cursor pagination) —
        GET /api/v1/groups?limit=2 page1 -> exactly 2 items + a NON-null
        next_cursor, page2 (cursor) -> the remaining 1 item + null next_cursor,
        union = all 3 distinct groups (no overlap/gap);
        GET /api/v1/groups/{id}/members?limit=2 paginates 3 members the same way
        (each item carries a non-empty added_at); and limit/cursor bounds are
        enforced (limit=0/201 and telemetry limit=999 -> 400, malformed/negative
        cursor -> 400). 50 passed / 0 failed / 0 skipped; RESULT: PASS.
      asserted_lines:
        - "telemetry seed accepted all 6 events (accepted=6 rejected=0)"
        - "?event=installing returns ONLY the 2 installing events (no other type leaked)"
        - "GET telemetry?event=<bogus> -> 400 (unknown event type rejected, not silently empty) (HTTP 400)"
        - "both window boundaries are INCLUSIVE (since=... and until=... are present)"
        - "since/until window returns exactly the 3 in-window events, none outside (inclusive bounds)"
        - "telemetry cursor walk visited all 6 events across 3 pages with no overlap/gap"
        - "groups page1: exactly 2 items + a NON-null next_cursor"
        - "groups page2: the remaining 1 item + null next_cursor (last page)"
        - "groups pagination has NO overlap and NO gap (union of pages = all 3 distinct groups)"
        - "members page1: 2 items (each with added_at) + a NON-null next_cursor"
        - "members pagination has NO overlap and NO gap (union of pages = all 3 distinct members)"
        - "GET /groups?limit=201 -> 400 (limit above max 200) (HTTP 400)"
        - "GET telemetry?cursor=-1 -> 400 (negative cursor) (HTTP 400)"
      evidence_artifact: tests/e2e/FILTERS_PAGINATION_EVIDENCE.txt
