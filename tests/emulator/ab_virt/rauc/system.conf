# =============================================================================
# system.conf — RK3588 A/B-virt emulator: RAUC system configuration (PWU-AB-2)
# -----------------------------------------------------------------------------
# In-guest /etc/rauc/system.conf for the dm-verity A/B update proof. Installed
# into BOTH slot rootfs images (slot A on /dev/vda2, slot B on /dev/vda3) by a
# build_image.sh Buildroot rootfs overlay (NOT wired yet — see
# docs/design/rk3588_ab_virt/PWU_AB_2_RAUC_VERITY.md §4.4/§6.2).
#
# Selects RAUC's U-Boot backend, which reads/writes the boot selection via
# fw_setenv/fw_printenv (BOOT_ORDER + per-slot BOOT_<bootname>_LEFT) against the
# location /etc/fw_env.config points at. bootname=A/B match the BOOT_ORDER
# tokens this project's uboot_ab/boot.cmd already reads (PWU-AB-1 head-select);
# device=/dev/vda2|3 match the proven GPT layout (assemble_ab_disk.sh +
# uboot_ab/boot.cmd:34-40 + uboot_ab/README.md GPT contract).
#
# §11.4.6 STATUS: authored config artifact, NOT yet installed or exercised. No
#   rauc install has run against it. The [keyring] cert is the throwaway dev
#   cert gen_dev_keys.sh produces into the gitignored out/ tree (NEVER committed,
#   §11.4.10) and staged to /etc/rauc/dev.cert.pem in the rootfs overlay.
#
# Sources verified 2026-06-11:
#   https://rauc.readthedocs.io/en/latest/integration.html  (bootloader=uboot,
#     [slot.rootfs.N] bootname/device, [keyring] path)
#   https://rauc.readthedocs.io/en/latest/examples.html      ([system] layout)
# Cross-refs: PWU_AB_2_RAUC_VERITY.md §4.4 ; manifest.raucm.in (compatible MUST
#   match [update] compatible) ; fw_env.config (the env location, §4.5) ;
#   gen_dev_keys.sh (the keyring cert) ; uboot_ab/boot.cmd (BOOT_ORDER scheme).
# =============================================================================

[system]
compatible=helix-ota-ab-virt
bootloader=uboot
mountprefix=/mnt/rauc
# Accept the signed verity bundle this project builds; forbid unsigned plain.
bundle-formats=-plain

[keyring]
# Dev keyring = the self-signed dev cert (gen_dev_keys.sh). Staged into the
# rootfs overlay at this path. NEVER the private key — cert (public) only.
path=/etc/rauc/dev.cert.pem

# Slot A — partition 2 on the single A/B virtio-blk disk (/dev/vda2).
[slot.rootfs.0]
device=/dev/vda2
type=ext4
bootname=A

# Slot B — partition 3 (/dev/vda3). The INACTIVE slot when A is booted; the
# target a `rauc install` writes + activates (BOOT_ORDER head -> B).
[slot.rootfs.1]
device=/dev/vda3
type=ext4
bootname=B
