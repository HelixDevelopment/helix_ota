# Helix OTA — Postgres service for store integration tests + local dev.
# Brought up on-demand by the containers submodule's boot/compose orchestrator
# (the on-demand-infra invariant: tests boot their own infra, no manual steps).
# Host port 55432 avoids colliding with any ambient host Postgres on 5432.
services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: helix
      POSTGRES_PASSWORD: helix
      POSTGRES_DB: helix_ota
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helix -d helix_ota"]
      interval: 2s
      timeout: 3s
      retries: 30
