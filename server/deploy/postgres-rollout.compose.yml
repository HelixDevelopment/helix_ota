# Postgres for the rollout StoragePort integration test. Distinct host port
# (55445) from the store integration test (55432) so the two integration
# packages can boot concurrently under `go test`.
services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: helix
      POSTGRES_PASSWORD: helix
      POSTGRES_DB: helix_ota
    ports:
      - "55445:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helix -d helix_ota"]
      interval: 2s
      timeout: 3s
      retries: 30
