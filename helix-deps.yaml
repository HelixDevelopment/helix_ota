  - name: challenges
    ssh_url: git@github.com:vasic-digital/Challenges.git
    ref: f85bf3501a6118c41456a54878d82cb8ea868cd4
    describe: 1.0.2-dev-0.0.2-267-gf85bf35
    layout: grouped
    why: >-
      Challenges acceptance-test bank engine (§11.4.27). Required by HelixQA's
