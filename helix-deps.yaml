    why: >-
      Containers submodule (§11.4.76) — Docker/Podman/Qemu/emulator containerization
      means for running services + the OTA emulator fleet on-demand (pkg/boot,
      pkg/compose, pkg/health).

  # --- OTA building bricks (grouped, under submodules/) ---
