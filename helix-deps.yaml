# =============================================================================
# helix-deps.yaml — Submodule-Dependency Manifest (Constitution §11.4.31 / CONST-054)
# -----------------------------------------------------------------------------
# Machine-readable declaration of this project's OWN-ORG Git SSH dependencies so a
# new consuming project (or a fresh clone) can reconstruct the dependency graph at
# its root via `incorporate-submodule <ssh-url>` (recursive per §11.4.31), which
# adds each dep at its canonical path, reads the dep's own helix-deps.yaml, recurses,
# aborts on conflicting refs, and emits <root>/.helix-manifest.yaml.
#
# OWN-ORG scope (§11.4.28 / §11.4.79): only dependencies under the orgs we control
# (HelixDevelopment, vasic-digital) are declared here. Third-party dependencies are
# noted under `third_party:` for honesty but are NOT incorporated as own-org deps.
#
# GROUNDED IN REALITY (§11.4.6 — no invented refs): every `ssh_url` comes verbatim
# from .gitmodules; every `ref` is the exact value reported by `git submodule status`
# + `git -C <path> describe --tags --always` on 2026-06-10 (the authoritative
# committed pointer). No ref here is guessed. `pinned_commit` is the committed
# gitlink SHA; `describe` is the human-readable tag-relative form (or `heads/main`
# for the two main-tracked submodules that carry no tag).
#
# LAYOUT (§11.4.28(C)): `grouped` = lives under <root>/submodules/<name>/;
#   `flat` = lives directly under <root>/<name>/. Nested own-org submodule chains
#   are FORBIDDEN — each dep is reached from the parent root, never nested.
# =============================================================================
schema_version: 1

deps:
  # --- Governance + infra (flat, at repo root) ---
  - name: constitution
    ssh_url: git@github.com:HelixDevelopment/HelixConstitution.git
    ref: ba0f70272784927e0b64004cc941ae7199c87c12
    describe: heads/main
    layout: flat
    why: >-
      The Helix Constitution — canonical root governance (Constitution.md / CLAUDE.md
      / AGENTS.md). Inherited unconditionally per §11.4.35; ships install_upstreams,
      find_constitution.sh, and the inherited codegraph_*/workable-items tooling.

