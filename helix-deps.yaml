# Third-party (NOT own-org) dependencies — declared for honesty per §11.4.74 / §11.4.79.
# These are resolved by their language toolchain (go mod, etc.), NOT incorporated as
# own-org submodules, and are EXCLUDED from the CodeGraph own-org index per §11.4.79.
third_party:
  - name: telebot
    source: gopkg.in/telebot.v3
    resolved_by: go-mod
    note: >-
      Third-party Telegram bot client (if pulled by any consuming Go module). NOT an
      own-org dependency — declared here only so consumers do not mistake it for one.

transitive_handling:
  recursive: true
  conflict_resolution: operator-required

language_specific_subtree: false
